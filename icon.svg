<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" style="background-color: #000000;">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <filter id="heavy-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="25" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <linearGradient id="edge-shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="25%" stop-color="#ffffff" stop-opacity="0.9" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.2" />
      <stop offset="75%" stop-color="#ffffff" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="1" />
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="#000000" />

  <g transform="translate(256, 256) rotate(-10) translate(-256, -256)">
    <!-- Base outer reflection -->
    <path d="M260,80 C380,80 430,130 430,250 C430,370 380,430 260,430 C140,430 80,370 80,250 C80,130 140,80 260,80 Z" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="8" filter="url(#glow)" />
    
    <!-- Main thick glassy rim -->
    <path d="M260,86 C372,86 420,136 420,250 C420,362 372,420 260,420 C148,420 90,362 90,250 C90,138 148,86 260,86 Z" fill="none" stroke="url(#edge-shine)" stroke-width="8" filter="url(#soft-glow)" />
    
    <!-- Very thin inner crisp edge -->
    <path d="M260,94 C364,94 410,144 410,250 C410,354 364,410 260,410 C156,410 100,354 100,250 C100,146 156,94 260,94 Z" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.9" />

    <!-- Sharp top-left specular highlight -->
    <path d="M120,160 C150,110 200,94 260,94 C220,94 160,115 120,160 Z" fill="#ffffff" filter="url(#heavy-glow)" />
    
    <!-- Bright intense spot top left -->
    <ellipse cx="140" cy="140" rx="30" ry="18" transform="rotate(-40 140 140)" fill="#ffffff" filter="url(#glow)" />
    <ellipse cx="140" cy="140" rx="14" ry="7" transform="rotate(-40 140 140)" fill="#ffffff" />
    <ellipse cx="140" cy="140" rx="6" ry="3" transform="rotate(-40 140 140)" fill="#ffffff" filter="url(#soft-glow)" />
    
    <!-- Subtler long shine on top edge -->
    <path d="M160,95 Q230,82 300,90 Q240,94 160,95 Z" fill="#ffffff" filter="url(#glow)" opacity="0.8" />
    
    <!-- Subtle bottom right inner reflection -->
    <path d="M270,405 Q350,395 395,330 Q340,385 270,405 Z" fill="#ffffff" opacity="0.6" filter="url(#soft-glow)" />
  </g>
</svg>
